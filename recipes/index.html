<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W09 Prove: Recipe Book</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A recipe book">
    <meta property="og:url" content="https://benwayland-cell.github.io/wdd131/recipes/">
    <meta property="og:image" content="images/website-screenshot.png">

    <!-- X Card -->
    <meta name="twitter:card" content="images/website-screenshot.png">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A recipe book">
    <meta name="twitter:image" content="images/website-screenshot.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="https://wddbyui.github.io/wdd131/images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="https://wddbyui.github.io/wdd131/images/apple-touch-icon.png">
                
</head>
<body>
    <header>
        <img src="images/recipe-book.png">
        <h1>Recipe Book</h1>
    </header>
    <main>
        <form id="search">
            <input type="text" name="searchText" placeholder="Find a recipe" required>
            <div class="divider"></div>
            <button type="submit"><img src="images/search.svg"></button>
        </form>

        <div class="divider"></div>

        <section id="recipes"></section>
        
        <footer>
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>                  
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
        </footer>
    </main>
</body>
</html>
