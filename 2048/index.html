<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <meta name="description" content="The classic game of 2048">
    <link rel="stylesheet" href="index.css"/>
    <script src="index.js" defer></script>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="2048 Game">
    <meta property="og:description" content="The classic video game of 2048">
    <meta property="og:url" content="https://benwayland-cell.github.io/wdd131/2048/">
    <meta property="og:image" content="images/website-screenshot.png">

    <!-- X Card -->
    <meta name="twitter:card" content="images/website-screenshot.png">
    <meta name="twitter:title" content="2048 Game">
    <meta name="twitter:description" content="The classic video game of 2048">
    <meta name="twitter:image" content="images/website-screenshot.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/favicon.png">
</head>
<body>
<main>
    <h1>2048</h1>
    
    <section id="UI">
        <p id="score">Score: 0</p>
        <button class="newGameButton">New Game</button>
    </section>

    <section id="board"></section>
    

    <section id="winScreen">
        <section>
            <h2>You won the game!</h2>
            <button id="continueButton">Continue</button>
            <button class="newGameButton">New Game</button>
        </section>
    </section>

    <section id="lossScreen">
        <section>
            <h2>You lost.<br>:(</h2>
            <button class="newGameButton">New Game</button>
        </section>
    </section>
</main>
</body>
</html>
